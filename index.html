<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Invitation ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#fde7ec;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:360px;
            background:#fff;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        h1{
            margin-bottom:15px;
            color:#ff4d6d;
        }

        p{
            margin-bottom:20px;
        }

        input,select,textarea{
            width:100%;
            padding:10px;
            margin:8px 0 15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff4d6d;
            color:#fff;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e63956;
        }
    </style>
</head>

<body>

<div class="container">

<h1>💖 Date Invitation 💖</h1>

<p>Would you like to go on a date with me?</p>

<form>

<label>Name</label>
<input type="text" required>

<label>Preferred Date</label>
<input type="date" required>

<label>Preferred Time</label>
<input type="time">

<label>Preferred Place</label>
<input type="text">

<label>Would you like to go?</label>
<select>
<option>Yes 😊</option>
<option>Maybe 🤔</option>
<option>Let's Talk 💬</option>
</select>

<label>Message</label>
<textarea rows="4"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
